apiVersion: apps/v1
kind: Deployment
metadata:
  name: weight-controller
  labels:
    app.kubernetes.io/name: weight-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weight-controller
  template:
    metadata:
      labels:
        app: weight-controller
        app.kubernetes.io/name: weight-controller
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: weight-controller
      containers:
        - name: controller
          image: ghcr.io/yehuditkerido/weight-controller:latest
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --reconcile-interval=10s
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
